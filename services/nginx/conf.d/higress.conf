upstream higress-http {
    server higress:8080;
}

upstream higress-https {
    server higress:8443;
}

upstream higress-admin {
    server higress:9000;
}

upstream tuwunel-matrix {
    server tuwunel:6167;
}

server {
    listen 80;
    server_name gateway.${DOMAIN};

    client_max_body_size 64m;

    # Matrix federation delegation
    location /_matrix/ {
        proxy_pass http://tuwunel-matrix;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location = /higress-admin {
        return 301 /higress-admin/;
    }

    # Higress admin console
    location /higress-admin/ {
        proxy_pass http://higress-admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://higress-http;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

server {
    listen 443 ssl;
    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    server_name gateway.${DOMAIN};

    client_max_body_size 64m;

    # Matrix federation delegation
    location /_matrix/ {
        proxy_pass http://tuwunel-matrix;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location = /higress-admin {
        return 301 /higress-admin/;
    }

    # Higress admin console
    location /higress-admin/ {
        proxy_pass http://higress-admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass https://higress-https;
        proxy_ssl_name $host;
        proxy_ssl_server_name on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
