apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - target:
      kind: Deployment
      name: higress
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: higress
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: higress
                resources:
                  requests:
                    cpu: 100m
                    memory: 128Mi
                  limits:
                    cpu: 250m
                    memory: 256Mi
  - target:
      kind: StatefulSet
      name: tuwunel
    patch: |-
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: tuwunel
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: tuwunel
                resources:
                  requests:
                    cpu: 250m
                    memory: 256Mi
                  limits:
                    cpu: 500m
                    memory: 512Mi
  - target:
      kind: Deployment
      name: element-web
    patch: |-
      apiVersion: apps/v1
