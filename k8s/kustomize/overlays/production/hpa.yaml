apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hiclaw-manager
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hiclaw-manager
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
