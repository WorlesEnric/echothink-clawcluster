            containers:
              - name: tuwunel
                resources:
                  requests:
                    cpu: "1"
                    memory: 1Gi
                  limits:
                    cpu: "2"
                    memory: 2Gi
        volumeClaimTemplates:
          - metadata:
              name: data
            spec:
              accessModes:
                - ReadWriteOnce
              storageClassName: standard
              resources:
                requests:
                  storage: 100Gi
