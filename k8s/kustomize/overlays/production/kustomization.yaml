apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - hpa.yaml
patches:
  - target:
      kind: Deployment
      name: higress
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: higress
      spec:
        replicas: 2
        template:
          spec:
            affinity:
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      topologyKey: kubernetes.io/hostname
                      labelSelector:
                        matchExpressions:
                          - key: app.kubernetes.io/part-of
                            operator: In
                            values:
                              - clawcluster
            containers:
              - name: higress
                resources:
                  requests:
                    cpu: 500m
                    memory: 512Mi
                  limits:
                    cpu: "2"
                    memory: 1Gi
  - target:
      kind: StatefulSet
      name: tuwunel
    patch: |-
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: tuwunel
      spec:
        template:
          spec:
