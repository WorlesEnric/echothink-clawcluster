apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clawcluster
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/instance: clawcluster
    app.kubernetes.io/part-of: clawcluster
    app.kubernetes.io/component: ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "64m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: gateway.clawcluster.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: higress
                port:
                  name: http
    - host: matrix.clawcluster.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tuwunel
                port:
                  name: http
    - host: element.clawcluster.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: element-web
                port:
                  name: http
    - host: manager.clawcluster.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hiclaw-manager
                port:
                  name: http
    - host: intake.clawcluster.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: intake-bridge
                port:
                  name: http
    - host: publisher.clawcluster.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: publisher-bridge
                port:
                  name: http
    - host: policy.clawcluster.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: policy-bridge
                port:
                  name: http
    - host: observability.clawcluster.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: observability-bridge
                port:
                  name: http
