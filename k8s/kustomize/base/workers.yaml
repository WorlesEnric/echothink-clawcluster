apiVersion: v1
kind: ConfigMap
metadata:
  name: planner-worker-config
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/instance: clawcluster
    app.kubernetes.io/part-of: clawcluster
    app.kubernetes.io/component: planner-worker
data:
  worker.yaml: |
    name: "planner-worker"
    role: "planner"
    model: "claude-sonnet-4-6"
    description: "Breaks goals into executable plans and acceptance criteria."
    managerUrl: "http://hiclaw-manager:8088"
    gatewayUrl: "http://higress:8080"
    matrixUrl: "http://tuwunel:6167"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: planner-worker
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/instance: clawcluster
    app.kubernetes.io/part-of: clawcluster
    app.kubernetes.io/component: planner-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: clawcluster
      app.kubernetes.io/component: planner-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: kustomize
        app.kubernetes.io/instance: clawcluster
        app.kubernetes.io/part-of: clawcluster
        app.kubernetes.io/component: planner-worker
    spec:
      containers:
        - name: planner-worker
          image: ghcr.io/opencoai/openclaw:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: OPENCLAW_NODE_ROLE
              value: worker
            - name: OPENCLAW_WORKER_CLASS
              value: planner
            - name: OPENCLAW_MANAGER_URL
              value: http://hiclaw-manager:8088
            - name: OPENCLAW_CLUSTER_NAME
              value: clawcluster-dev
            - name: OPENCLAW_DOMAIN
              value: clawcluster.example.com
            - name: OPENCLAW_SHARED_STORAGE_PROVIDER
              value: minio
            - name: OPENCLAW_SHARED_STORAGE_ENDPOINT
              value: https://minio.echothink.internal
            - name: OPENCLAW_SHARED_STORAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: clawcluster-upstream
                  key: minio-access-key
            - name: OPENCLAW_SHARED_STORAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: clawcluster-upstream
                  key: minio-secret-key
            - name: OPENCLAW_SHARED_STORAGE_BUCKET
              value: clawcluster-sharedfs
            - name: HICLAW_MANAGER_LOG_LEVEL
              value: info
            - name: WORKER_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: clawcluster-runtime
                  key: worker-jwt-secret
            - name: VPN_PEER_ENDPOINT
              value: vpn-peer.clawcluster.example.com:51820
            - name: MTLS_CA_CERT_PATH
              value: /etc/clawcluster/ca/ca.pem
            - name: OUTLINE_URL
              value: https://outline.echothink.internal
            - name: GRAPHITI_URL
              value: https://graphiti.echothink.internal
            - name: HATCHET_SERVER_URL
              value: https://hatchet.echothink.internal
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: runtime
              mountPath: /var/lib/clawcluster
            - name: config
              mountPath: /etc/openclaw/worker.yaml
              subPath: worker.yaml
            - name: ca-cert
              mountPath: /etc/clawcluster/ca
              readOnly: true
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - test -n "$OPENCLAW_WORKER_CLASS" && test -n "$OPENCLAW_MANAGER_URL" && test -d /var/lib/clawcluster && test -f /etc/openclaw/worker.yaml && test -n "$WORKER_JWT_SECRET"
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - test -n "$OPENCLAW_WORKER_CLASS" && test -n "$OPENCLAW_MANAGER_URL" && test -d /var/lib/clawcluster && test -f /etc/openclaw/worker.yaml
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
      volumes:
        - name: runtime
          emptyDir: {}
        - name: config
          configMap:
            name: planner-worker-config
        - name: ca-cert
          secret:
            secretName: clawcluster-runtime
            items:
              - key: ca.pem
                path: ca.pem
---
