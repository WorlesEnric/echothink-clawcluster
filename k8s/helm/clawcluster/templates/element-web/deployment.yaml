{{- $fullname := include "clawcluster.fullname" . -}}
{{- $namespace := include "clawcluster.namespace" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-element-web
  namespace: {{ $namespace }}
  labels:
    {{- include "clawcluster.componentLabels" (dict "ctx" . "component" "element-web") | nindent 4 }}
spec:
  replicas: {{ .Values.elementWeb.replicas }}
  selector:
    matchLabels:
      {{- include "clawcluster.componentSelectorLabels" (dict "ctx" . "component" "element-web") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "clawcluster.componentLabels" (dict "ctx" . "component" "element-web") | nindent 8 }}
    spec:
      {{- with .Values.elementWeb.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.elementWeb.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.elementWeb.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: element-web
          {{- include "clawcluster.image" (dict "image" .Values.elementWeb.image "policy" .Values.global.imagePullPolicy) | nindent 10 }}
          ports:
            - name: http
              containerPort: 80
          resources:
            {{- toYaml .Values.elementWeb.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /app/config.json
              subPath: config.json
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 5
      volumes:
        - name: config
          configMap:
            name: {{ $fullname }}-element-web
