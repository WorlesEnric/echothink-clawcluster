{{- $fullname := include "clawcluster.fullname" . -}}
{{- $namespace := include "clawcluster.namespace" . -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-tuwunel
  namespace: {{ $namespace }}
  labels:
    {{- include "clawcluster.componentLabels" (dict "ctx" . "component" "tuwunel") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.tuwunel.service.port }}
      targetPort: http
  selector:
    {{- include "clawcluster.componentSelectorLabels" (dict "ctx" . "component" "tuwunel") | nindent 4 }}
