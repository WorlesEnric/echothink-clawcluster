{{- $fullname := include "clawcluster.fullname" . -}}
{{- $namespace := include "clawcluster.namespace" . -}}
{{- if not .Values.hiclawManager.workspace.existingClaim }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $fullname }}-hiclaw-manager-workspace
  namespace: {{ $namespace }}
  labels:
    {{- include "clawcluster.componentLabels" (dict "ctx" . "component" "hiclaw-manager") | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.hiclawManager.workspace.accessMode }}
  resources:
    requests:
      storage: {{ .Values.hiclawManager.workspace.size }}
  {{- include "clawcluster.storageClass" . | nindent 2 }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-hiclaw-manager
  namespace: {{ $namespace }}
  labels:
    {{- include "clawcluster.componentLabels" (dict "ctx" . "component" "hiclaw-manager") | nindent 4 }}
spec:
  replicas: {{ .Values.hiclawManager.replicas }}
  selector:
    matchLabels:
      {{- include "clawcluster.componentSelectorLabels" (dict "ctx" . "component" "hiclaw-manager") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "clawcluster.componentLabels" (dict "ctx" . "component" "hiclaw-manager") | nindent 8 }}
    spec:
      {{- with .Values.hiclawManager.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.hiclawManager.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.hiclawManager.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: hiclaw-manager
          {{- include "clawcluster.image" (dict "image" .Values.hiclawManager.image "policy" .Values.global.imagePullPolicy) | nindent 10 }}
          ports:
            - name: http
              containerPort: {{ .Values.hiclawManager.service.port }}
          env:
            - name: PORT
              value: {{ .Values.hiclawManager.service.port | quote }}
            - name: HICLAW_MANAGER_PORT
              value: {{ .Values.hiclawManager.service.port | quote }}
            - name: HICLAW_MANAGER_LOG_LEVEL
              value: {{ .Values.hiclawManager.config.logLevel | quote }}
            - name: OPENCLAW_NODE_ROLE
              value: manager
            - name: OPENCLAW_CLUSTER_NAME
              value: {{ .Values.global.clusterName | quote }}
            - name: OPENCLAW_DOMAIN
              value: {{ .Values.global.domain | quote }}
            - name: OPENCLAW_PUBLIC_URL
              value: {{ printf "http://%s-hiclaw-manager:%v" $fullname .Values.hiclawManager.service.port | quote }}
            - name: OPENCLAW_SHARED_STORAGE_PROVIDER
              value: minio
            - name: OPENCLAW_SHARED_STORAGE_ENDPOINT
              value: {{ .Values.externalServices.minio.endpoint | quote }}
            - name: OPENCLAW_SHARED_STORAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalServices.minio.existingSecret }}
                  key: {{ .Values.externalServices.minio.accessKeyKey }}
            - name: OPENCLAW_SHARED_STORAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalServices.minio.existingSecret }}
                  key: {{ .Values.externalServices.minio.secretKeyKey }}
            - name: OPENCLAW_SHARED_STORAGE_BUCKET
              value: {{ .Values.externalServices.minio.bucket | quote }}
            - name: VPN_PEER_ENDPOINT
              value: {{ .Values.security.vpnPeerEndpoint | quote }}
            - name: MTLS_CA_CERT_PATH
              value: {{ .Values.global.caMountPath | quote }}
            - name: WORKER_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ default .Values.security.existingSecret .Values.hiclawManager.existingSecret }}
                  key: {{ .Values.security.workerJwtSecretKey }}
            {{- range $name, $value := .Values.hiclawManager.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $name, $ref := .Values.hiclawManager.secretEnv }}
            - name: {{ $name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $ref.existingSecret | default $.Values.hiclawManager.existingSecret }}
                  key: {{ $ref.key }}
            {{- end }}
          resources:
            {{- toYaml .Values.hiclawManager.resources | nindent 12 }}
          volumeMounts:
            - name: workspace
              mountPath: {{ .Values.hiclawManager.workspace.mountPath }}
            - name: agent-configs
              mountPath: {{ .Values.hiclawManager.agentConfigMountPath }}
            - name: ca-cert
              mountPath: /etc/clawcluster/ca
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 5
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: {{ .Values.hiclawManager.workspace.existingClaim | default (printf "%s-hiclaw-manager-workspace" $fullname) }}
        - name: agent-configs
          configMap:
            name: {{ $fullname }}-hiclaw-manager
            items:
              - key: manager.yaml
                path: manager/openclaw.yaml
              {{- range .Values.workers }}
              - key: {{ .name }}.yaml
                path: {{ .name }}/openclaw.yaml
              {{- end }}
        - name: ca-cert
          secret:
            secretName: {{ .Values.security.caSecretName }}
            items:
              - key: {{ .Values.security.caSecretKey }}
                path: ca.pem
